version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    labels:
      - "A-Dependencies"
      - "Z-Deps-Backend"
    schedule:
      interval: "monthly"
    groups:
      axum:
        patterns:
          - "axum"
          - "axum-*"
      opentelemetry:
        patterns:
          - "opentelemetry"
          - "opentelemetry_sdk"
          - "opentelemetry-*"
          - "tracing-opentelemetry"
      sea-query:
        patterns:
          - "sea-query"
          - "sea-query-*"
      sentry:
        patterns:
          - "sentry"
          - "sentry-*"
      tracing:
        patterns:
          - "tracing-*"
        exclude-patterns:
          - "tracing-opentelemetry"
      icu:
        patterns:
          - "icu"
          - "icu_*"
    cooldown:
      default-days: 14

  - package-ecosystem: "github-actions"
    directory: "/"
    labels:
      - "A-Dependencies"
      - "Z-Deps-CI"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 14

  - package-ecosystem: "npm"
    # pnpm workspace lives at the repo root, includes mostly frontend
    # dependencies but also a few tools
    directory: "/"
    labels:
      - "A-Dependencies"
      - "Z-Deps-Frontend"
    schedule:
      interval: "monthly"
    groups:
      storybook:
        patterns:
          - "storybook"
          - "storybook-*"
          - "@storybook/*"
      fontsource:
        patterns:
          - "@fontsource/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-*"
      i18next:
        patterns:
          - "i18next"
          - "i18next-*"
          - "react-i18next"
      react:
        patterns:
          - "react"
          - "react-*"
        exclude-patterns:
          - "react-i18next"
      jotai:
        patterns:
          - "jotai"
          - "jotai-*"
      graphql-codegen:
        patterns:
          - "@graphql-codegen/*"
      tanstack-router:
        patterns:
          - "@tanstack/react-router"
          - "@tanstack/react-router-*"
          - "@tanstack/router-*"
      tanstack-query:
        patterns:
          - "@tanstack/react-query"
          - "@tanstack/react-query-*"
      types:
        patterns:
          - "@types/*"
      browser-logos:
        patterns:
          - "@browser-logos/*"
    cooldown:
      default-days: 14
